name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  mlops:
    name: Train + Build + Push Image + Deploy
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: file:./mlruns
      PYTHONPATH: .

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      # 2️⃣ Python setup
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[http]"

      # 4️⃣ Configure DVC remote credentials (uses DAGSHUB_TOKEN secret)
      - name: Configure DVC remote
        run: |
          dvc remote modify dagshub --local auth basic
          dvc remote modify dagshub --local user kartiksri2005
          dvc remote modify dagshub --local password ${{ secrets.DAGSHUB_TOKEN }}

      # 5️⃣ Pull data + cached artifacts from DagsHub
      - name: Pull DVC data
        run: dvc pull data/raw/flight_price.csv

      # 6️⃣ Run ML pipeline — skips unchanged stages automatically
      - name: Run ML pipeline
        run: dvc repro

      # 7️⃣ Push new outputs to DagsHub remote cache
      - name: Push artifacts to DagsHub
        run: dvc push

      # 8️⃣ Commit updated dvc.lock back to repo
      - name: Commit dvc.lock
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add dvc.lock
          git commit -m "chore: update dvc.lock [skip ci]" || echo "No changes to dvc.lock"
          git push

      # 9️⃣ Copy artifacts → docker backend
      - name: Update backend artifacts
        run: python mlops_src/update_artifacts.py

      # 🔟 Build & push Docker image
      - name: Build & Push Docker Image
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker build -t aeroprice-backend ./docker_backend
          docker tag aeroprice-backend docker.io/${{ secrets.DOCKERHUB_USERNAME }}/aeroprice-backend:latest
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/aeroprice-backend:latest

      # 1️⃣1️⃣ Deploy to Render
      - name: Deploy to Render
        env:
          RENDER_TOKEN: ${{ secrets.RENDER_TOKEN }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -X POST \
          -H "Authorization: Bearer $RENDER_TOKEN" \
          -H "accept: application/json" \
          -H "content-type: application/json" \
          -d '{"image": "'"${{ secrets.DOCKERHUB_USERNAME }}"'/aeroprice-backend:latest"}' \
          https://api.render.com/deploy/srv-d9eam2bbc2fs73fk1ppg?key=7gotTI61apg

          
